  name: "FastAPI 输入验证和序列化"
  version: "1.0.0"
  description: "使用 Pydantic 模型进行严格的输入验证，防止恶意数据注入"
  authors:
    - "RuleForge Auto-Generated"
    - "FastAPI 数据验证指南"
  license: "MIT"
  tags:
    - "fastapi"
