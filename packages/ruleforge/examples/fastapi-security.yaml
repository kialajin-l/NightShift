# 规则 3: SQL 注入防护
meta:
  id: fastapi-sql-injection-protection
  name: "FastAPI SQL 注入防护"
  version: "1.0.0"
  description: "使用参数化查询和 ORM，防止 SQL 注入攻击"
  authors:
    - "RuleForge Auto-Generated"
    - "OWASP SQL 注入防护指南"
  license: "MIT"
  tags:
    - "fastapi"
    - "security"
    - "sql"
    - "injection"
    - "orm"
  created_at: "2026-01-20T11:30:00Z"

rule:
  trigger:
    keywords:
      - "SQL"
      - "query"
      - "execute"
      - "database"
      - "ORM"
    file_pattern: "**/database/*.py"
    language: "python"
  
  condition: "检测到原始 SQL 查询，存在 SQL 注入风险"
  
  suggestion: |
    使用参数化查询或 ORM，防止 SQL 注入攻击。
    
    危险代码示例：
    ```python
    # ❌ 极度危险：字符串拼接 SQL
    @app.get("/users/{user_id}")
    async def get_user(user_id: int):
        query = f"SELECT * FROM users WHERE id = {user_id}"
        # 存在 SQL 注入风险！
        result = await database.execute(query)
        return result
    ```
    
    安全实现方案：
    
    ## 方案 1: 使用 SQLAlchemy ORM
    ```python
    # ✅ 推荐：使用 ORM
    from sqlalchemy import select
    from sqlalchemy.ext.asyncio import AsyncSession
    
    @app.get("/users/{user_id}")
    async def get_user(user_id: int, db: AsyncSession = Depends(get_db)):
        query = select(User).where(User.id == user_id)
        result = await db.execute(query)
        user = result.scalar_one_or_none()
        if not user:
            raise HTTPException(status_code=404, detail="User not found")
        return user
    ```
    
    ## 方案 2: 使用参数化查询
    ```python
    # ✅ 推荐：参数化查询
    @app.get("/users/{user_id}")
    async def get_user(user_id: int, db: Database = Depends(get_db)):
        query = "SELECT * FROM users WHERE id = :user_id"
        result = await db.fetch_one(query, values={"user_id": user_id})
        if not result:
            raise HTTPException(status_code=404, detail="User not found")
        return result
    ```
    
    ## 方案 3: 使用 Pydantic 和 ORM 结合
    ```python
    # ✅ 推荐：完整的安全方案
    from sqlalchemy.orm import Session
    from pydantic import BaseModel
    
    class UserFilter(BaseModel):
        username: Optional[str] = None
        email: Optional[str] = None
        min_age: Optional[int] = Field(None, ge=0)
        max_age: Optional[int] = Field(None, le=150)
    
    @app.get("/users/")
    async def get_users(
        filter: UserFilter = Depends(),
        db: Session = Depends(get_db)
    ):
        query = db.query(User)
        
        if filter.username:
            query = query.filter(User.username.ilike(f"%{filter.username}%"))
        if filter.email:
            query = query.filter(User.email == filter.email)
        if filter.min_age is not None:
            query = query.filter(User.age >= filter.min_age)
        if filter.max_age is not None:
            query = query.filter(User.age <= filter.max_age)
        
        users = query.all()
        return users
    ```
    
    SQL 注入防护最佳实践：
    - 永远不要信任用户输入
    - 使用参数化查询或 ORM
    - 实施最小权限原则
    - 定期进行安全审计
    - 使用 Web 应用防火墙（WAF）

