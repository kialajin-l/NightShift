  created_at: "2026-01-20T11:15:00Z"

rule:
  trigger:
    keywords:
      - "pydantic"
      - "BaseModel"
      - "validation"
      - "Field"
      - "validator"
    file_pattern: "**/models/*.py"
    language: "python"
  
  condition: "检测到 API 端点缺少输入验证，存在数据注入风险"
  
  suggestion: |
    使用 Pydantic 模型进行严格的输入验证，防止恶意数据注入和类型错误。
    
    问题代码示例：
    ```python
    # ❌ 不推荐：缺少输入验证
    @app.post("/users/")
    async def create_user(username: str, email: str, age: int):
        # 直接使用原始输入，存在安全风险
        user = User(username=username, email=email, age=age)
        return user
    ```
    
    完整的安全验证实现：
    ```python
    # ✅ 推荐：使用 Pydantic 进行严格验证
    from pydantic import BaseModel, EmailStr, Field, validator
    from typing import Optional
    import re
    
    class UserCreate(BaseModel):
        username: str = Field(..., min_length=3, max_length=50, regex="^[a-zA-Z0-9_]+$")
        email: EmailStr
        password: str = Field(..., min_length=8)
        age: int = Field(..., ge=0, le=150)
        phone: Optional[str] = Field(None, regex="^\\+?[1-9]\\d{1,14}$")
    
        @validator('password')
        def password_strength(cls, v):
            if len(v) < 8:
                raise ValueError('Password must be at least 8 characters')
            if not re.search(r'[A-Z]', v):
                raise ValueError('Password must contain at least one uppercase letter')
            if not re.search(r'[a-z]', v):
                raise ValueError('Password must contain at least one lowercase letter')
            if not re.search(r'\\d', v):
                raise ValueError('Password must contain at least one digit')
            return v
    
    class UserResponse(BaseModel):
        id: int
        username: str
        email: EmailStr
        age: int
        
        class Config:
            orm_mode = True
    
    # 安全端点
    @app.post("/users/", response_model=UserResponse)
    async def create_user(user_data: UserCreate):
        # 数据已经过验证
        user = User(**user_data.dict(exclude={'password'}))
        user.hashed_password = get_password_hash(user_data.password)
        await user.save()
        return user
    ```
    
    验证最佳实践：
    - 使用 EmailStr 验证邮箱格式
    - 设置合理的字段长度限制
    - 使用正则表达式验证复杂格式
    - 实现自定义验证器检查业务规则
    - 使用 response_model 确保输出安全

