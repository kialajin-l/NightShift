# 规则 4: CORS 和安全头配置
meta:
  id: fastapi-cors-security-headers
  name: "FastAPI CORS 和安全头配置"
  version: "1.0.0"
  description: "正确配置 CORS 和安全头，防止跨站攻击和信息泄露"
  authors:
    - "RuleForge Auto-Generated"
    - "OWASP 安全头指南"
  license: "MIT"
  tags:
    - "fastapi"
    - "security"
    - "cors"
    - "headers"
  created_at: "2026-01-20T11:45:00Z"

rule:
  trigger:
    keywords:
      - "CORS"
      - "middleware"
      - "headers"
      - "security"
    file_pattern: "**/main.py"
    language: "python"
  
  condition: "检测到缺少 CORS 配置或安全头，存在跨站攻击风险"
  
  suggestion: |
    正确配置 CORS 和安全头，保护应用免受跨站攻击和信息泄露。
    
    完整的安全配置：
    ```python
    from fastapi import FastAPI
    from fastapi.middleware.cors import CORSMiddleware
    from fastapi.middleware.httpsredirect import HTTPSRedirectMiddleware
    from fastapi.middleware.trustedhost import TrustedHostMiddleware
    
    app = FastAPI(
        title="Secure API",
        description="A secure FastAPI application",
        version="1.0.0",
        docs_url="/docs",
        redoc_url="/redoc"
    )
    
    # CORS 配置
    app.add_middleware(
        CORSMiddleware,
        allow_origins=["https://example.com", "https://app.example.com"],  # 生产环境限制域名
        allow_credentials=True,
        allow_methods=["GET", "POST", "PUT", "DELETE", "OPTIONS"],
        allow_headers=["*"],
        max_age=3600,  # 预检请求缓存时间
    )
    
    # 安全头中间件
    @app.middleware("http")
    async def add_security_headers(request, call_next):
        response = await call_next(request)
        
        # 安全头配置
        response.headers["X-Content-Type-Options"] = "nosniff"
        response.headers["X-Frame-Options"] = "DENY"
        response.headers["X-XSS-Protection"] = "1; mode=block"
        response.headers["Strict-Transport-Security"] = "max-age=31536000; includeSubDomains"
        response.headers["Referrer-Policy"] = "strict-origin-when-cross-origin"
        response.headers["Content-Security-Policy"] = "default-src 'self'"
        
        return response
    
    # 可信主机中间件
    app.add_middleware(
        TrustedHostMiddleware,
        allowed_hosts=["example.com", "*.example.com"]  # 生产环境限制主机
    )
    
    # HTTPS 重定向（生产环境）
    # app.add_middleware(HTTPSRedirectMiddleware)
    ```
    
    安全头说明：
    - **X-Content-Type-Options**: 防止 MIME 类型嗅探
    - **X-Frame-Options**: 防止点击劫持
    - **X-XSS-Protection**: 启用 XSS 保护
    - **Strict-Transport-Security**: 强制 HTTPS
    - **Referrer-Policy**: 控制 Referer 头信息
    - **Content-Security-Policy**: 内容安全策略
    
    环境特定配置：
    ```python
    import os
    
    # 根据环境调整配置
    if os.getenv("ENVIRONMENT") == "production":
        # 生产环境严格配置
        cors_origins = ["https://example.com"]
        trusted_hosts = ["example.com"]
    else:
        # 开发环境宽松配置
        cors_origins = ["*"]
        trusted_hosts = ["*"]
    ```

