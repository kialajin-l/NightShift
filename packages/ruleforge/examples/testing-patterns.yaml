# 规则 3: E2E 测试最佳实践
meta:
  id: e2e-testing-best-practices
  name: "E2E 测试最佳实践"
  version: "1.0.0"
  description: "端到端测试的组织和执行最佳实践，确保应用整体功能的正确性"
  authors:
    - "RuleForge Auto-Generated"
    - "E2E 测试自动化指南"
  license: "MIT"
  tags:
    - "testing"
    - "e2e"
    - "cypress"
    - "playwright"
    - "automation"
  created_at: "2026-01-20T12:30:00Z"

rule:
  trigger:
    keywords:
      - "cypress"
      - "playwright"
      - "e2e"
      - "page"
      - "fixture"
    file_pattern: "**/e2e/*.{js,ts}"
    language: "typescript"
  
  condition: "检测到 E2E 测试组织不当，可能影响测试稳定性和维护性"
  
  suggestion: |
    遵循 E2E 测试最佳实践，确保测试的稳定性、可维护性和执行效率。
    
    问题代码示例：
    ```typescript
    // ❌ 不推荐：脆弱的 E2E 测试
    it('should login and create post', () => {
      cy.visit('/');
      cy.get('[data-testid=username]').type('user123');
      cy.get('[data-testid=password]').type('password123');
      cy.get('[data-testid=login-btn]').click();
      
      // 依赖特定 UI 结构，容易失败
      cy.get('.post-editor textarea').type('Hello World');
      cy.get('.submit-button').click();
      
      cy.contains('Hello World').should('be.visible');
    });
    ```
    
    改进的 E2E 测试：
    ```typescript
    // ✅ 推荐：稳定的 E2E 测试
    describe('Blog Application', () => {
      beforeEach(() => {
        // 使用测试专用的 API 准备数据
        cy.createTestUser();
        cy.loginTestUser();
      });
      
      it('should allow authenticated user to create a post', () => {
        // Arrange
        const postContent = 'Test post content';
        
        // Act
        cy.visit('/dashboard');
        
        // 使用数据属性选择器，避免 CSS 变化影响
        cy.get('[data-testid=create-post-btn]').click();
        cy.get('[data-testid=post-editor]').type(postContent);
        cy.get('[data-testid=submit-post-btn]').click();
        
        // Assert
        cy.get('[data-testid=post-list]')
          .should('contain', postContent)
          .and('be.visible');
      });
      
      it('should display validation errors for empty post', () => {
        // Act
        cy.visit('/dashboard');
        cy.get('[data-testid=create-post-btn]').click();
        cy.get('[data-testid=submit-post-btn]').click();
        
        // Assert
        cy.get('[data-testid=validation-error]')
          .should('contain', 'Post content cannot be empty')
          .and('be.visible');
      });
    });
    ```
    
    E2E 测试最佳实践：
    
    ## 测试数据管理：
    ```typescript
    // 使用 Fixture 管理测试数据
    beforeEach(() => {
      cy.fixture('test-user.json').then((userData) => {
        cy.request('POST', '/api/test/setup', userData);
      });
    });
    
    afterEach(() => {
      cy.request('POST', '/api/test/cleanup');
    });
    ```
    
    ## 页面对象模式：
    ```typescript
    // 创建可重用的页面对象
    class LoginPage {
      visit() {
        cy.visit('/login');
      }
      
      fillCredentials(username: string, password: string) {
        cy.get('[data-testid=username]').type(username);
        cy.get('[data-testid=password]').type(password);
      }
      
      submit() {
        cy.get('[data-testid=login-btn]').click();
      }
      
      expectSuccess() {
        cy.url().should('include', '/dashboard');
      }
    }
    
    // 在测试中使用
    it('should login successfully', () => {
      const loginPage = new LoginPage();
      loginPage.visit();
      loginPage.fillCredentials('testuser', 'password');
      loginPage.submit();
      loginPage.expectSuccess();
    });
    ```
    
    ## 配置和优化：
    ```typescript
    // cypress.config.js
    module.exports = {
      e2e: {
        baseUrl: 'http://localhost:3000',
        viewportWidth: 1280,
        viewportHeight: 720,
        // 失败时重试
        retries: {
          runMode: 2,
          openMode: 0,
        },
      },
    };
    ```

