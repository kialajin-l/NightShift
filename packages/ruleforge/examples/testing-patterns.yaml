# 规则 2: Mock 使用规范
meta:
  id: mock-usage-patterns
  name: "Mock 使用规范"
  version: "1.0.0"
  description: "合理使用 Mock 和 Stub，隔离外部依赖，提高测试稳定性和速度"
  authors:
    - "RuleForge Auto-Generated"
    - "测试隔离最佳实践"
  license: "MIT"
  tags:
    - "testing"
    - "mock"
    - "stub"
    - "isolation"
  created_at: "2026-01-20T12:15:00Z"

rule:
  trigger:
    keywords:
      - "vi.fn"
      - "jest.fn"
      - "mock"
      - "spyOn"
      - "stub"
    file_pattern: "**/*.test.{js,ts}"
    language: "typescript"
  
  condition: "检测到 Mock 使用不当，可能导致测试不稳定或难以维护"
  
  suggestion: |
    合理使用 Mock 和 Stub，隔离外部依赖，确保测试的稳定性和可维护性。
    
    问题代码示例：
    ```typescript
    // ❌ 不推荐：过度 Mock
    test('user service', () => {
      // Mock 所有依赖，测试失去意义
      const mockDB = { findUser: vi.fn() };
      const mockCache = { get: vi.fn() };
      const mockLogger = { info: vi.fn() };
      
      const service = new UserService(mockDB, mockCache, mockLogger);
      // ... 复杂的 Mock 设置
    });
    ```
    
    合理的 Mock 使用：
    ```typescript
    // ✅ 推荐：合理的 Mock 策略
    describe('UserService', () => {
      let userService: UserService;
      let mockUserRepository: jest.Mocked<UserRepository>;
      
      beforeEach(() => {
        // 只 Mock 外部依赖
        mockUserRepository = {
          findById: jest.fn(),
          save: jest.fn(),
          delete: jest.fn(),
        } as jest.Mocked<UserRepository>;
        
        userService = new UserService(mockUserRepository);
      });
      
      it('should find user by id', async () => {
        // Arrange
        const userId = '123';
        const mockUser = { id: userId, name: 'John' };
        mockUserRepository.findById.mockResolvedValue(mockUser);
        
        // Act
        const result = await userService.findUserById(userId);
        
        // Assert
        expect(mockUserRepository.findById).toHaveBeenCalledWith(userId);
        expect(result).toEqual(mockUser);
      });
      
      it('should return null when user not found', async () => {
        // Arrange
        const userId = 'nonexistent';
        mockUserRepository.findById.mockResolvedValue(null);
        
        // Act
        const result = await userService.findUserById(userId);
        
        // Assert
        expect(result).toBeNull();
      });
    });
    ```
    
    Mock 使用指南：
    
    ## 应该 Mock 的情况：
    - 外部 API 调用
    - 数据库操作
    - 文件系统操作
    - 网络请求
    - 随机数生成
    - 当前时间
    
    ## 不应该 Mock 的情况：
    - 纯函数（无副作用）
    - 业务逻辑核心算法
    - 简单的数据转换
    
    ## Mock 最佳实践：
    ```typescript
    // 使用类型安全的 Mock
    interface ExternalService {
      fetchData(): Promise<Data>;
    }
    
    const mockService: jest.Mocked<ExternalService> = {
      fetchData: jest.fn(),
    };
    
    // 设置合理的默认返回值
    mockService.fetchData.mockResolvedValue({ success: true });
    
    // 验证调用次数和参数
    expect(mockService.fetchData).toHaveBeenCalledTimes(1);
    expect(mockService.fetchData).toHaveBeenCalledWith(expectedParams);
    ```

