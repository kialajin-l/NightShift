# 规则 4: 测试覆盖率和质量
meta:
  id: test-coverage-quality
  name: "测试覆盖率和质量"
  version: "1.0.0"
  description: "确保测试覆盖关键路径，同时关注测试质量和可维护性"
  authors:
    - "RuleForge Auto-Generated"
    - "测试质量评估指南"
  license: "MIT"
  tags:
    - "testing"
    - "coverage"
    - "quality"
    - "maintainability"
  created_at: "2026-01-20T12:45:00Z"

rule:
  trigger:
    keywords:
      - "coverage"
      - "istanbul"
      - "vitest"
      - "jest"
      - "assert"
    file_pattern: "**/*.test.{js,ts}"
    language: "typescript"
  
  condition: "检测到测试覆盖率不足或测试质量有问题"
  
  suggestion: |
    关注测试覆盖率和质量平衡，确保测试既全面又易于维护。
    
    覆盖率配置示例：
    ```javascript
    // vitest.config.js
    import { defineConfig } from 'vitest/config';
    
    export default defineConfig({
      test: {
        coverage: {
          reporter: ['text', 'html', 'lcov'],
          thresholds: {
            global: {
              branches: 80,
              functions: 80,
              lines: 80,
              statements: 80,
            },
          },
          exclude: [
            '**/*.config.*',
            '**/*.d.ts',
            '**/types/**',
            '**/coverage/**',
          ],
        },
      },
    });
    ```
    
    质量检查工具：
    ```json
    // package.json 脚本
    {
      "scripts": {
        "test:unit": "vitest run",
        "test:coverage": "vitest run --coverage",
        "test:quality": "npm run test:coverage && npm run lint:test",
        "lint:test": "eslint __tests__ --ext .ts,.js"
      }
    }
    ```
    
    测试质量检查清单：
    
    ## ✅ 好的测试特征：
    - 测试名称清晰描述行为
    - 每个测试只验证一个场景
    - 使用恰当的断言库
    - 包含边界条件测试
    - 错误场景得到充分测试
    - 测试数据准备充分
    
    ## ❌ 需要改进的测试：
    - 测试名称模糊（"test 1", "should work"）
    - 一个测试验证多个不相关功能
    - 过度 Mock 导致测试失去意义
    - 缺少错误场景测试
    - 测试依赖特定执行顺序
    
    质量改进示例：
    ```typescript
    // ❌ 需要改进的测试
    test('user service', () => {
      // 模糊的测试名称
      // 验证多个不相关功能
      const user = userService.createUser({ name: 'John' });
      expect(user.id).toBeDefined();
      
      const found = userService.findUser(user.id);
      expect(found.name).toBe('John');
      
      userService.deleteUser(user.id);
      expect(userService.findUser(user.id)).toBeNull();
    });
    
    // ✅ 改进后的测试
    describe('UserService', () => {
      describe('createUser', () => {
        it('should create user with valid data', () => {
          const userData = { name: 'John', email: 'john@example.com' };
          const user = userService.createUser(userData);
          expect(user.id).toBeDefined();
          expect(user.name).toBe(userData.name);
        });
        
        it('should throw error for invalid email', () => {
          const invalidData = { name: 'John', email: 'invalid' };
          expect(() => userService.createUser(invalidData)).toThrow('Invalid email');
        });
      });
      
      describe('findUser', () => {
        it('should return user for existing id', () => {
          const user = userService.createUser({ name: 'John' });
          const found = userService.findUser(user.id);
          expect(found).toEqual(user);
        });
        
        it('should return null for non-existent id', () => {
          const found = userService.findUser('nonexistent');
          expect(found).toBeNull();
        });
      });
    });
    ```
    
    持续集成配置：
    ```yaml
    # .github/workflows/test.yml
    name: Test and Coverage
    on: [push, pull_request]
    jobs:
      test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v3
          - uses: actions/setup-node@v3
          - run: npm ci
          - run: npm run test:quality
          - name: Upload coverage
            uses: codecov/codecov-action@v3
    ```

