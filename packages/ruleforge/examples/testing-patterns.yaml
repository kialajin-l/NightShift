# 测试最佳实践规则集合
# 基于实际测试经验的单元测试和 E2E 测试最佳实践

---
# 规则 1: 单元测试结构规范
meta:
  id: unit-test-structure
  name: "单元测试结构规范"
  version: "1.0.0"
  description: "遵循 AAA 模式（Arrange-Act-Assert）组织测试代码，提高可读性和可维护性"
  authors:
    - "RuleForge Auto-Generated"
    - "测试驱动开发最佳实践"
  license: "MIT"
  tags:
    - "testing"
    - "unit-test"
    - "structure"
    - "aaa"
  created_at: "2026-01-20T12:00:00Z"

rule:
  trigger:
    keywords:
      - "describe"
      - "it"
      - "test"
      - "expect"
      - "assert"
    file_pattern: "**/*.test.{js,ts}"
    language: "typescript"
  
  condition: "检测到测试代码结构混乱，缺少清晰的 Arrange-Act-Assert 分离"
  
  suggestion: |
    遵循 AAA 模式（Arrange-Act-Assert）组织测试代码，每个测试用例应该清晰分离准备、执行和验证阶段。
    
    问题代码示例：
    ```typescript
    // ❌ 不推荐：结构混乱的测试
    test('format greeting', () => {
      const result = formatGreeting('hello');
      expect(result).toBe('Hello');
      
      const result2 = formatGreeting('HELLO');
      expect(result2).toBe('HELLO');
      
      const result3 = formatGreeting('');
      expect(result3).toBe('');
    });
    ```
    
    修复后代码：
    ```typescript
    // ✅ 推荐：清晰的 AAA 结构
    describe('formatGreeting', () => {
      it('should capitalize the first letter of a greeting', () => {
        // Arrange
        const input = 'hello world';
        
        // Act
        const result = formatGreeting(input);
        
        // Assert
        expect(result).toBe('Hello world');
      });
      
      it('should handle empty string', () => {
        // Arrange
        const input = '';
        
        // Act
        const result = formatGreeting(input);
        
        // Assert
        expect(result).toBe('');
      });
      
      it('should handle already capitalized string', () => {
        // Arrange
        const input = 'Hello World';
        
        // Act
        const result = formatGreeting(input);
        
        // Assert
        expect(result).toBe('Hello World');
      });
    });
    ```
    
    最佳实践：
    - **Arrange**: 准备测试数据和环境
    - **Act**: 执行被测试的功能
    - **Assert**: 验证结果是否符合预期
    - 每个测试用例只测试一个场景
    - 使用清晰的测试描述
    - 避免测试用例间的依赖

compatibility:
  frameworks:
    vitest: ">=1.0.0"
    jest: ">=29.0.0"
  languages:
    typescript: ">=4.5.0"
    javascript: ">=ES2020"
  rep_version: "0.1"

