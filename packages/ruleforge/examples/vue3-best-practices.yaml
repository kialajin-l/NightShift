# 规则 4: 组件事件定义规范
meta:
  id: vue3-component-events
  name: "Vue 3 组件事件定义规范"
  version: "1.0.0"
  description: "使用 defineEmits 定义组件事件，提供类型安全的事件处理"
  authors:
    - "RuleForge Auto-Generated"
    - "Vue 3 类型安全指南"
  license: "MIT"
  tags:
    - "vue3"
    - "events"
    - "typescript"
    - "defineEmits"
  created_at: "2026-01-20T10:45:00Z"

rule:
  trigger:
    keywords:
      - "defineEmits"
      - "$emit"
      - "emits"
      - "event"
    file_pattern: "**/*.vue"
    language: "typescript"
  
  condition: "检测到组件事件未使用 defineEmits 定义，缺少类型安全"
  
  suggestion: |
    使用 defineEmits 定义组件事件，提供类型安全的事件参数和返回值。
    
    问题代码示例：
    ```typescript
    // ❌ 不推荐：字符串形式，缺少类型安全
    export default {
      emits: ['update:modelValue', 'submit', 'cancel']
    }
    ```
    
    修复后代码：
    ```typescript
    // ✅ 推荐：使用 defineEmits 和类型定义
    interface Emits {
      (e: 'update:modelValue', value: string): void
      (e: 'submit', payload: FormData): void
      (e: 'cancel'): void
    }
    
    const emit = defineEmits<Emits>()
    ```
    
    或者使用运行时验证：
    ```typescript
    // ✅ 推荐：运行时验证
    const emit = defineEmits({
      'update:modelValue': (value: string) => {
        return typeof value === 'string' && value.length > 0
      },
      submit: (payload: FormData) => {
        return payload instanceof FormData
      },
      cancel: () => true
    })
    ```
    
    最佳实践：
    - 为所有事件定义明确的参数类型
    - 使用接口定义复杂的事件签名
    - 为重要事件添加运行时验证
    - 保持事件名称的一致性

compatibility:
  frameworks:
    vue: ">=3.3.0"
  languages:
    typescript: ">=5.0.0"
  rep_version: "0.1"