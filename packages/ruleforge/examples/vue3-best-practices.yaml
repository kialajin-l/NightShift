# 规则 1: Props 类型校验
meta:
  id: vue3-props-validation
  name: "Vue 3 Props 类型校验"
  version: "1.0.0"
  description: "使用 TypeScript interface 定义 props，提供完整的类型安全和 IDE 智能提示"
  authors:
    - "RuleForge Auto-Generated"
    - "Vue 3 最佳实践指南"
  license: "MIT"
  tags:
    - "vue3"
    - "typescript"
    - "props"
    - "validation"
  created_at: "2026-01-20T10:00:00Z"

rule:
  trigger:
    keywords:
      - "defineProps"
      - "props"
      - "interface"
      - "validation"
    file_pattern: "**/*.vue"
    language: "typescript"
  
  condition: "检测到 Vue 组件使用数组形式定义 props，缺少类型安全和运行时验证"
  
  suggestion: |
    使用 TypeScript interface 定义 props，提供完整的类型安全、IDE 智能提示和运行时验证。
    
    问题代码示例：
    ```typescript
    // ❌ 不推荐：数组形式，缺少类型安全
    export default {
      props: ['title', 'count', 'disabled']
    }
    ```
    
    修复后代码：
    ```typescript
    // ✅ 推荐：对象形式，完整的类型安全
    interface Props {
      title: string
      count?: number
      disabled?: boolean
    }
    
    export default {
      props: {
        title: {
          type: String,
          required: true,
          validator: (value: string) => value.length > 0
        },
        count: {
          type: Number,
          default: 0,
          validator: (value: number) => value >= 0
        },
        disabled: {
          type: Boolean,
          default: false
        }
      } as const
    }
    ```
    
    或者使用 Composition API：
    ```typescript
    // ✅ 推荐：Composition API + TypeScript
    interface Props {
      title: string
      count?: number
    }
    
    const props = defineProps<Props>()
    ```

compatibility:
  frameworks:
    vue: ">=3.3.0"
    "@vue/composition-api": ">=1.0.0"
  languages:
    typescript: ">=5.0.0"
  rep_version: "0.1"

