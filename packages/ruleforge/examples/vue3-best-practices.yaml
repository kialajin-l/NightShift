# 规则 2: Composables 命名规范
meta:
  id: vue3-composables-naming
  name: "Vue 3 Composables 命名规范"
  version: "1.0.0"
  description: "Composables 函数应该使用 use 前缀，遵循 Vue 3 命名约定"
  authors:
    - "RuleForge Auto-Generated"
    - "Vue 3 官方风格指南"
  license: "MIT"
  tags:
    - "vue3"
    - "composables"
    - "naming"
    - "best-practices"
  created_at: "2026-01-20T10:15:00Z"

rule:
  trigger:
    keywords:
      - "use"
      - "composable"
      - "ref"
      - "reactive"
      - "computed"
    file_pattern: "**/composables/*.ts"
    language: "typescript"
  
  condition: "检测到可组合函数未使用 use 前缀命名"
  
  suggestion: |
    Composables 函数应该使用 use 前缀命名，遵循 Vue 3 官方约定，提高代码可读性和一致性。
    
    问题代码示例：
    ```typescript
    // ❌ 不推荐：缺少 use 前缀
    export function counter(initialValue: number = 0) {
      const count = ref(initialValue)
      const increment = () => count.value++
      return { count, increment }
    }
    ```
    
    修复后代码：
    ```typescript
    // ✅ 推荐：使用 use 前缀
    export function useCounter(initialValue: number = 0) {
      const count = ref(initialValue)
      const increment = () => count.value++
      const reset = () => count.value = initialValue
      
      return {
        count: readonly(count),
        increment,
        reset
      }
    }
    ```
    
    最佳实践：
    - 使用 use 前缀标识可组合函数
    - 返回响应式状态的只读版本
    - 提供完整的类型定义
    - 包含适当的错误处理

compatibility:
  frameworks:
    vue: ">=3.0.0"
  languages:
    typescript: ">=4.5.0"
  rep_version: "0.1"

