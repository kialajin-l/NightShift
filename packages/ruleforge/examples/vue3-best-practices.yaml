# 规则 3: 响应式数据最佳实践
meta:
  id: vue3-reactive-best-practices
  name: "Vue 3 响应式数据最佳实践"
  version: "1.0.0"
  description: "合理使用 ref 和 reactive，避免不必要的响应式开销"
  authors:
    - "RuleForge Auto-Generated"
    - "Vue 3 性能优化指南"
  license: "MIT"
  tags:
    - "vue3"
    - "reactivity"
    - "performance"
    - "ref"
    - "reactive"
  created_at: "2026-01-20T10:30:00Z"

rule:
  trigger:
    keywords:
      - "ref"
      - "reactive"
      - "shallowRef"
      - "shallowReactive"
      - "computed"
    file_pattern: "**/*.{vue,ts}"
    language: "typescript"
  
  condition: "检测到响应式数据使用不当，可能导致性能问题"
  
  suggestion: |
    合理选择 ref 和 reactive，避免不必要的响应式开销，提高应用性能。
    
    使用指南：
    
    ## 使用 ref 的场景：
    ```typescript
    // ✅ 基本类型值
    const count = ref(0)
    const name = ref('')
    const isLoading = ref(false)
    
    // ✅ DOM 引用
    const inputRef = ref<HTMLInputElement>()
    ```
    
    ## 使用 reactive 的场景：
    ```typescript
    // ✅ 对象字面量
    const state = reactive({
      user: { name: 'John', age: 30 },
      settings: { theme: 'dark', language: 'en' }
    })
    ```
    
    ## 避免的情况：
    ```typescript
    // ❌ 不推荐：基本类型使用 reactive
    const count = reactive({ value: 0 }) // 使用 ref(0) 代替
    
    // ❌ 不推荐：大型数组使用深度响应式
    const largeArray = reactive([...]) // 考虑使用 shallowReactive
    ```
    
    ## 性能优化技巧：
    ```typescript
    // ✅ 使用 shallowRef 避免深度响应式
    const largeObject = shallowRef({ ...largeData })
    
    // ✅ 使用 markRaw 标记非响应式对象
    const staticConfig = markRaw({ ...staticData })
    
    // ✅ 合理使用 computed 缓存计算
    const fullName = computed(() => `${firstName.value} ${lastName.value}`)
    ```

compatibility:
  frameworks:
    vue: ">=3.2.0"
  languages:
    typescript: ">=4.5.0"
  rep_version: "0.1"

